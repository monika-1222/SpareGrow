<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white/80 backdrop-blur-md border-b border-slate-200/50 shadow-sm">
    <div class="flex items-center gap-3">
        <button class="material-symbols-outlined text-teal-900 hover:opacity-80 transition-opacity cursor-pointer" data-icon="arrow_back" onclick="navigate('WalletOverview_5609f92e5e924a72a75b627360229f5f.html')">arrow_back</button>
        <span class="text-teal-900 font-extrabold tracking-tight font-manrope text-lg">Top Up Wallet</span>
    </div>
</header>

<main class="pt-24 px-gutter max-w-[576px] mx-auto space-y-md pb-32">
    
    <!-- Amount Selection -->
    <div class="bg-white p-6 rounded-2xl border border-slate-200/50 shadow-sm text-center">
        <p class="font-label-caps text-outline mb-2">ENTER AMOUNT TO DEPOSIT</p>
        <div class="flex items-center justify-center text-primary font-display-lg text-5xl mb-6">
            <span class="text-3xl text-outline mr-1">₹</span>
            <input type="number" id="amount" value="500" class="bg-transparent border-none outline-none w-32 text-center text-primary p-0 m-0" oninput="updateIntent()">
        </div>

        <div class="flex gap-2 justify-center">
            <button class="px-4 py-2 rounded-full border border-outline-variant font-data-mono text-sm text-on-surface-variant hover:bg-secondary/10 hover:border-secondary hover:text-secondary transition-colors" onclick="setAmount(500)">+₹500</button>
            <button class="px-4 py-2 rounded-full border border-outline-variant font-data-mono text-sm text-on-surface-variant hover:bg-secondary/10 hover:border-secondary hover:text-secondary transition-colors" onclick="setAmount(1000)">+₹1,000</button>
            <button class="px-4 py-2 rounded-full border border-outline-variant font-data-mono text-sm text-on-surface-variant hover:bg-secondary/10 hover:border-secondary hover:text-secondary transition-colors" onclick="setAmount(5000)">+₹5,000</button>
        </div>
    </div>

    <!-- Payment Methods -->
    <div>
        <h2 class="font-label-caps text-outline uppercase tracking-widest mb-4 ml-2">Select UPI App</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <a id="gpay-btn" href="#" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200/50 rounded-xl hover:border-secondary transition-colors shadow-sm active:scale-95">
                <div class="w-12 h-12 bg-surface-container-low rounded-full mb-2 flex items-center justify-center text-primary font-bold">GPay</div>
                <span class="font-title-sm text-sm text-primary">Google Pay</span>
            </a>
            
            <a id="phonepe-btn" href="#" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200/50 rounded-xl hover:border-secondary transition-colors shadow-sm active:scale-95">
                <div class="w-12 h-12 bg-surface-container-low rounded-full mb-2 flex items-center justify-center text-primary font-bold">Pe</div>
                <span class="font-title-sm text-sm text-primary">PhonePe</span>
            </a>

            <a id="paytm-btn" href="#" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200/50 rounded-xl hover:border-secondary transition-colors shadow-sm active:scale-95">
                <div class="w-12 h-12 bg-surface-container-low rounded-full mb-2 flex items-center justify-center text-primary font-bold">Pay</div>
                <span class="font-title-sm text-sm text-primary">Paytm</span>
            </a>

            <button class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200/50 rounded-xl hover:border-secondary transition-colors shadow-sm active:scale-95" onclick="document.getElementById('qr-modal').classList.remove('hidden')">
                <div class="w-12 h-12 bg-secondary-container rounded-full mb-2 flex items-center justify-center text-on-secondary-container">
                    <span class="material-symbols-outlined">qr_code_2</span>
                </div>
                <span class="font-title-sm text-sm text-primary">Show QR</span>
            </button>
        </div>
    </div>

    <!-- Security Badges -->
    <div class="flex justify-center gap-4 opacity-50 mt-8">
        <div class="flex items-center gap-1 text-xs font-label-caps text-outline">
            <span class="material-symbols-outlined text-[14px]">verified_user</span> 100% SECURE
        </div>
        <div class="flex items-center gap-1 text-xs font-label-caps text-outline">
            <span class="material-symbols-outlined text-[14px]">bolt</span> INSTANT
        </div>
    </div>
</main>

<!-- QR Code Modal (Hidden by default) -->
<div id="qr-modal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-[384px] rounded-3xl p-8 flex flex-col items-center text-center relative shadow-2xl scale-100 transition-transform">
        <button class="absolute top-4 right-4 text-outline hover:text-primary transition-colors" onclick="document.getElementById('qr-modal').classList.add('hidden')">
            <span class="material-symbols-outlined">close</span>
        </button>
        
        <div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-primary mb-4">
            <span class="material-symbols-outlined" style="font-size: 32px;">qr_code_scanner</span>
        </div>
        
        <h2 class="font-title-sm text-xl text-primary mb-1">Scan to Pay</h2>
        <p class="font-body-md text-sm text-on-surface-variant mb-6">Use any UPI app to scan and complete your payment of <strong class="text-primary" id="qr-amount">₹500</strong>.</p>
        
        <div class="w-48 h-48 bg-surface-container rounded-xl flex items-center justify-center mb-6 border-4 border-white shadow-inner relative overflow-hidden">
            <!-- Simulated QR Code Grid -->
            <div class="grid grid-cols-4 grid-rows-4 gap-1 w-32 h-32 opacity-80">
                <div class="bg-primary rounded-sm"></div><div class="bg-primary rounded-sm"></div><div class="bg-transparent"></div><div class="bg-primary rounded-sm"></div>
                <div class="bg-primary rounded-sm"></div><div class="bg-transparent"></div><div class="bg-primary rounded-sm"></div><div class="bg-transparent"></div>
                <div class="bg-transparent"></div><div class="bg-primary rounded-sm"></div><div class="bg-primary rounded-sm"></div><div class="bg-primary rounded-sm"></div>
                <div class="bg-primary rounded-sm"></div><div class="bg-primary rounded-sm"></div><div class="bg-transparent"></div><div class="bg-primary rounded-sm"></div>
            </div>
            <!-- Animated Scan Line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-secondary shadow-[0_0_10px_rgba(46,125,50,1)] animate-[scan_2s_ease-in-out_infinite]"></div>
        </div>
        
        <button id="simulate-payment-btn" class="w-full py-4 bg-primary text-white rounded-xl font-label-caps shadow-md hover:bg-primary/90">I've made the payment</button>
    </div>
</div>

<style>
@keyframes scan {
    0%, 100% { top: 10%; }
    50% { top: 90%; }
}
</style>

<script>
    function setAmount(val) {
        document.getElementById('amount').value = val;
        updateIntent();
    }

    function updateIntent() {
        const amt = document.getElementById('amount').value || '0';
        document.getElementById('qr-amount').innerText = `₹${amt}`;
        
        // Generate UPI deep links
        const pa = "sparegrow@bank";
        const pn = "SpareGrow Investments";
        const cu = "INR";
        const am = amt;
        const upiString = `upi://pay?pa=${pa}&pn=${pn}&am=${am}&cu=${cu}`;
        
        document.getElementById('gpay-btn').href = upiString;
        document.getElementById('phonepe-btn').href = upiString;
        document.getElementById('paytm-btn').href = upiString;
    }

    // Initialize intent links
    updateIntent();
</script>
